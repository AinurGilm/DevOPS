version: '3.8'

services:
  # Направляющий элемент для очередей событий
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: ml_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  # Брокер сообщений Apache Kafka (ЛР4)
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: ml_kafka_broker
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: KAFKA://kafka:29092,PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: KAFKA:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: KAFKA
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # Хранилище секретов HashiCorp Vault (ЛР3)
  vault:
    image: hashicorp/vault:1.15
    container_name: ml_vault_server
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root_token_value"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK

  # База данных PostgreSQL (ЛР2)
  db:
    image: postgres:15-alpine
    container_name: ml_postgres_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "vault_protected_password"
      POSTGRES_DB: "ml_predictions"

  # Веб-сервис модели (FastAPI + Producer)
  web:
    build: .
    container_name: fastapi_web_app
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root_token_value
    depends_on:
      - kafka
      - vault
      - db

  # Фоновый обработчик событий (Consumer)
  consumer:
    build: .
    container_name: kafka_events_consumer
    command: python src/consumer.py
    restart: on-failure
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root_token_value
    depends_on:
      - kafka
      - vault
      - db